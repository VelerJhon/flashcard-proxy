<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FlashCards">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="英単語フラッシュカード学習アプリ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>📚 Flash Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --text: #1e293b;
    --text-muted: #64748b;
    --correct: #16a34a;
    --wrong: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', -apple-system, 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100%; min-height: -webkit-fill-available;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px calc(60px + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }
  .bg-glow {
    position: fixed; top: -200px; left: -200px; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    -webkit-transform: translateZ(0); transform: translateZ(0);
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.4rem, 5vw, 2rem); color: var(--accent2);
    letter-spacing: 0.04em; margin-bottom: 6px; text-align: center; position: relative; z-index: 1;
  }
  .subtitle {
    color: var(--text-muted); font-size: 0.82rem;
    margin-bottom: 24px; text-align: center; position: relative; z-index: 1;
  }
  /* セクション一覧 */
  #sectionScreen { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .section-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .section-card {
    background: #fff; border-radius: 16px; padding: 16px 20px;
    border: 1.5px solid rgba(99,102,241,0.12); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: space-between;
    touch-action: manipulation; -webkit-transition: transform 0.12s; transition: transform 0.12s;
  }
  .section-card:active { -webkit-transform: scale(0.98); transform: scale(0.98); }
  .section-name { font-size: 1rem; font-weight: 700; color: var(--text); }
  .section-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .section-weak { font-size: 0.7rem; color: var(--wrong); margin-top: 3px; }
  .section-arrow { color: var(--accent2); font-size: 1.2rem; }
  /* 編集モードボタン */
  .btn-edit-mode {
    background: rgba(99,102,241,0.1); border: 1.5px solid rgba(99,102,241,0.25);
    border-radius: 10px; padding: 7px 16px; font-size: 0.82rem;
    font-weight: 700; color: var(--accent2); cursor: pointer; touch-action: manipulation;
    -webkit-appearance: none; appearance: none; font-family: 'Noto Sans JP', -apple-system, sans-serif;
    position: relative; z-index: 1; margin-bottom: 20px;
    -webkit-tap-highlight-color: transparent; -webkit-align-self: flex-end; align-self: flex-end;
  }
  /* 編集画面 */
  .edit-header { width: 100%; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .edit-title { flex: 1; text-align: center; font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .edit-add-btn {
    width: 100%; background: var(--accent2); color: #fff; border: none; border-radius: 12px;
    padding: 13px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; margin-bottom: 14px; display: block;
    -webkit-tap-highlight-color: transparent;
  }
  .edit-list { display: flex; flex-direction: column; gap: 8px; }
  .edit-list-item {
    background: #fff; border-radius: 14px; border: 1.5px solid rgba(99,102,241,0.1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.04); display: flex; align-items: center; overflow: hidden;
  }
  .edit-item-btn {
    flex: 1; padding: 14px 16px; text-align: left; background: none; border: none;
    cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; min-width: 0; display: block;
  }
  .edit-item-text { flex: 1; padding: 14px 16px; min-width: 0; }
  .edit-item-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .edit-item-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .edit-item-pos { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
  .edit-item-actions { display: flex; gap: 6px; padding-right: 12px; flex-shrink: 0; }
  .edit-icon-btn {
    background: rgba(99,102,241,0.08); border: 1.5px solid rgba(99,102,241,0.2);
    border-radius: 8px; font-size: 1rem; width: 36px; height: 36px; padding: 0; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .edit-icon-del { background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.2); }
  .edit-empty { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 24px 0; }
  /* 編集フォーム */
  .edit-form { display: flex; flex-direction: column; }
  .edit-form-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; margin-top: 14px; }
  .edit-form-input, .edit-form-textarea {
    width: 100%; background: #fff; border: 1.5px solid rgba(99,102,241,0.2); border-radius: 10px;
    color: var(--text); padding: 11px 12px; font-family: 'Noto Sans JP', -apple-system, sans-serif;
    font-size: 16px; -webkit-appearance: none; appearance: none; outline: none; box-sizing: border-box;
  }
  .edit-form-textarea { min-height: 72px; resize: vertical; }
  .edit-form-input:focus, .edit-form-textarea:focus { border-color: var(--accent2); }
  .edit-form-btn {
    width: 100%; padding: 13px; border: none; border-radius: 12px; margin-top: 12px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent;
  }
  .edit-form-btn-ok { background: var(--accent2); color: #fff; }
  .edit-form-btn-cancel { background: #f1f5f9; color: var(--text); }
  .edit-form-btn-del { background: var(--wrong); color: #fff; }
  .edit-confirm-msg { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; margin: 8px 0 4px; }
  .edit-move-btn {
    width: 100%; background: #fff; border: 1.5px solid rgba(99,102,241,0.15); border-radius: 12px;
    padding: 14px 16px; text-align: left; margin-bottom: 8px; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent;
    font-size: 0.9rem; font-weight: 700; color: var(--text);
  }
  /* モーダル */
  #modalOverlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 200;
    align-items: flex-end; justify-content: center; display: none;
  }
  #modalBox {
    background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .modal-drag-bar { width: 40px; height: 4px; background: #e2e8f0; border-radius: 99px; margin: 0 auto 16px; }
  #modalTitle { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; text-align: center; }
  .modal-input, .modal-textarea {
    width: 100%; background: #f8faff; border: 1.5px solid rgba(99,102,241,0.2);
    border-radius: 10px; color: var(--text); padding: 10px 12px;
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    font-size: 16px; -webkit-appearance: none; appearance: none; outline: none;
    display: block; margin-bottom: 10px; box-sizing: border-box;
  }
  .modal-textarea { min-height: 72px; resize: vertical; }
  .modal-input:focus, .modal-textarea:focus { border-color: var(--accent2); }
  #modalBtns { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .modal-btn {
    flex: 1; min-width: 100px; padding: 13px 10px; border: none; border-radius: 12px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
  }
  .modal-btn-ok { background: var(--accent2); color: #fff; }
  .modal-btn-cancel { background: #f1f5f9; color: var(--text); }
  .modal-btn-del { background: var(--wrong); color: #fff; }
  /* 単語編集一覧 */
  .word-edit-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .word-edit-item:last-child { border-bottom: none; }
  .word-edit-info { flex: 1; min-width: 0; }
  .word-edit-en { font-size: 0.88rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .word-edit-ja { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
  .word-edit-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .sec-btn {
    background: #f1f5f9; border: 1.5px solid rgba(0,0,0,0.08); border-radius: 7px;
    padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
  }
  .sec-btn-edit { color: var(--accent2); border-color: rgba(99,102,241,0.2); background: rgba(99,102,241,0.06); }
  .sec-btn-del { color: var(--wrong); border-color: rgba(220,38,38,0.2); background: rgba(220,38,38,0.06); }
  .btn-all {
    width: 100%; background: var(--accent2) !important; color: #fff !important; border: none;
    border-radius: 14px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 20px;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  }
  .btn-all:active { opacity: 0.85; }
  /* 追記エリア */
  .paste-section { width: 100%; max-width: 420px; margin-bottom: 24px; position: relative; z-index: 1; }
  .paste-toggle {
    font-size: 0.78rem; color: var(--text-muted); cursor: pointer;
    -webkit-user-select: none; user-select: none; padding: 8px 0;
    display: flex; align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .paste-toggle::before { content: '＋'; color: var(--accent2); font-size: 1rem; }
  .paste-toggle.open::before { content: '－'; }
  .paste-textarea {
    width: 100%; background: #fff; border: 1.5px solid rgba(99,102,241,0.2);
    border-radius: 12px; color: var(--text); font-family: 'Noto Sans JP', -apple-system, sans-serif;
    font-size: 16px; padding: 12px; resize: vertical; min-height: 120px; margin-top: 8px;
    outline: none; -webkit-appearance: none; appearance: none;
  }
  .paste-textarea:focus { border-color: var(--accent2); }
  .btn-load {
    margin-top: 10px; color: #fff; border: none; border-radius: 10px;
    padding: 10px 24px; font-size: 0.82rem; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    touch-action: manipulation; -webkit-appearance: none; appearance: none;
  }
  /* 学習画面 */
  #studyScreen { display: none; width: 100%; }
  .study-header { width: 100%; max-width: 420px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; position: relative; z-index: 1; }
  .btn-back {
    background: #fff; border: 1.5px solid rgba(99,102,241,0.2);
    border-radius: 10px; padding: 8px 14px; font-size: 0.82rem; font-weight: 700;
    color: var(--accent2); cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none;
  }
  .study-title { font-size: 0.9rem; font-weight: 700; color: var(--text); flex: 1; text-align: center; }
  .progress-wrap { width: 100%; max-width: 420px; margin-bottom: 16px; position: relative; z-index: 1; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; }
  .progress-bar-bg { background: #e2e8f0; border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 99px; transition: width 0.4s ease; }
  .score-row { display: flex; gap: 12px; margin-bottom: 20px; position: relative; z-index: 1; }
  .badge { display: flex; align-items: center; gap: 5px; background: #fff; border-radius: 99px; padding: 5px 14px; font-size: 0.8rem; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .badge.ok { color: var(--correct); border: 1px solid rgba(22,163,74,0.25); }
  .badge.ng { color: var(--wrong); border: 1px solid rgba(220,38,38,0.25); }
  /* カード */
  .card-area {
    perspective: 1200px; width: 100%; max-width: 420px; height: 280px; cursor: pointer;
    margin-bottom: 20px; position: relative; z-index: 1; touch-action: manipulation;
    animation: fadeUp 0.4s ease forwards;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%; transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform: translateZ(0) rotateY(0deg);
  }
  .card-inner.flipped { transform: translateZ(0) rotateY(180deg); }
  .card-face {
    position: absolute; top:0; left:0; right:0; bottom:0; border-radius: 20px; padding: 28px 24px;
    backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; transform: translateZ(0);
  }
  .card-front {
    background: linear-gradient(135deg, #fff 0%, #f8faff 100%); border: 1.5px solid rgba(99,102,241,0.15);
    box-shadow: 0 8px 32px rgba(99,102,241,0.1), 0 2px 8px rgba(0,0,0,0.06); align-items: center; text-align: center;
  }
  .card-back {
    background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%); border: 1.5px solid rgba(59,130,246,0.2);
    box-shadow: 0 8px 32px rgba(59,130,246,0.1), 0 2px 8px rgba(0,0,0,0.06); transform: translateZ(0) rotateY(180deg);
  }
  .card-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
  .card-word { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(2rem, 8vw, 3rem); color: var(--text); line-height: 1.1; margin-bottom: 8px; }
  .card-pos { display: inline-block; background: rgba(99,102,241,0.1); color: var(--accent2); border-radius: 99px; padding: 3px 12px; font-size: 0.72rem; font-weight: 700; }
  .tap-hint { position: absolute; bottom: 18px; right: 20px; font-size: 0.68rem; color: rgba(100,116,139,0.6); display: flex; align-items: center; gap: 4px; transform: translateZ(1px); }
  .back-meaning { font-size: 1.1rem; color: #1e40af; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
  .back-example { font-size: 0.78rem; color: #334155; line-height: 1.7; border-left: 3px solid #3b82f6; padding-left: 10px; margin-bottom: 6px; }
  .back-trans { font-size: 0.74rem; color: #64748b; line-height: 1.6; padding-left: 13px; }
  /* ボタン */
  .btn-row { display: flex; gap: 14px; width: 100%; max-width: 420px; margin-bottom: 10px; position: relative; z-index: 1; }
  .btn {
    flex: 1; border: none; border-radius: 14px; padding: 16px 10px;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    touch-action: manipulation; -webkit-appearance: none; appearance: none; user-select: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn-ok { background: linear-gradient(135deg, #2d6a4f, #4caf82); color: #fff; box-shadow: 0 4px 20px rgba(76,175,130,0.3); }
  .btn-ng { background: linear-gradient(135deg, #7b2d38, #e05a6a); color: #fff; box-shadow: 0 4px 20px rgba(224,90,106,0.3); }
  .btn-flip { background: #fff; color: var(--accent2); border: 1.5px solid rgba(99,102,241,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 0.6; }
  /* 完了画面 */
  .finish-screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 420px; animation: fadeUp 0.5s ease forwards; position: relative; z-index: 1; }
  .finish-screen.show { display: flex; }
  .finish-title { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; color: var(--accent2); margin-bottom: 10px; }
  .finish-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin: 20px 0; }
  .stat-card { background: #fff; border-radius: 16px; padding: 18px; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .stat-num { font-size: 2.2rem; font-weight: 700; font-family: 'Playfair Display', Georgia, serif; }
  .stat-num.ok { color: var(--correct); } .stat-num.ng { color: var(--wrong); }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  .btn-restart {
    background: linear-gradient(135deg, var(--accent2), #a48af7); color: #fff;
    border: none; border-radius: 14px; padding: 16px 40px; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 8px; margin-bottom: 12px; touch-action: manipulation;
    -webkit-appearance: none; appearance: none; font-family: 'Noto Sans JP', -apple-system, sans-serif;
  }
  .btn-back-home {
    background: #fff; border: 1.5px solid rgba(99,102,241,0.2); color: var(--accent2);
    border-radius: 14px; padding: 12px 32px; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
  }
  @keyframes fadeUp {from { opacity: 0; transform: translateY(20px); }to { opacity: 1; transform: translateY(0); }}
  /* タブナビ */
  .tab-nav { display: flex; gap: 8px; width: 100%; max-width: 420px; margin-bottom: 20px; position: relative; z-index: 1; }
  .tab-btn {
    flex: 1; padding: 10px 8px; border: none; border-radius: 12px; font-size: 0.82rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none; font-family: 'Noto Sans JP', -apple-system, sans-serif;
    transition: all 0.15s; background: #e8eaf6; color: #64748b; border: 1.5px solid rgba(99,102,241,0.15);
  }
  .tab-btn.active { background: var(--accent2) !important; color: #fff !important; border-color: transparent !important; box-shadow: 0 3px 12px rgba(99,102,241,0.4); }
  /* リスニング画面 */
  #listeningScreen { display: none; width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .listening-controls {
    background: #fff; border-radius: 16px; padding: 16px;
    border: 1.5px solid rgba(99,102,241,0.12); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .ctrl-row { display: flex; gap: 8px; align-items: center; }
  .ctrl-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; width: 56px; flex-shrink: 0; }
  .toggle-group { display: flex; gap: 6px; flex: 1; }
  .toggle-btn {
    flex: 1; padding: 7px 6px; border: 1.5px solid rgba(99,102,241,0.2); border-radius: 8px;
    font-size: 0.72rem; font-weight: 700; cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; background: #f8faff; color: var(--text-muted); transition: all 0.12s;
  }
  .toggle-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .listening-play-btn {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #16a34a, #4caf82); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none; font-family: 'Noto Sans JP', -apple-system, sans-serif;
    box-shadow: 0 4px 16px rgba(22,163,74,0.3); margin-bottom: 14px;
  }
  .listening-play-btn.playing { background: linear-gradient(135deg, #dc2626, #e05a6a); box-shadow: 0 4px 16px rgba(220,38,38,0.3); }
  .listening-progress {
    background: #fff; border-radius: 12px; padding: 12px 16px; border: 1.5px solid rgba(99,102,241,0.1); font-size: 0.78rem;
    color: var(--text-muted); text-align: center; margin-bottom: 14px; display: none;
  }
  .listening-progress .cur-word { font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 4px; }
  .listening-progress .cur-example { font-size: 0.78rem; color: var(--text); margin-top: 8px; line-height: 1.6; text-align: left; }
  .listening-progress .cur-trans { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; line-height: 1.5; text-align: left; }
  #listenSectionSelect {
    flex: 1; border: 1.5px solid rgba(99,102,241,0.2); border-radius: 8px; padding: 6px 10px;
    font-size: 0.78rem; color: var(--text); background: #f8faff; -webkit-appearance: none; appearance: none;
    font-family: 'Noto Sans JP', -apple-system, sans-serif; cursor: pointer; touch-action: manipulation;
  }
  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-list-item {
    background: #fff; border-radius: 12px; padding: 12px 14px; border: 1.5px solid rgba(99,102,241,0.08); display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
  }
  .word-list-item.playing-now { border-color: var(--accent2); background: rgba(99,102,241,0.04); }
  .word-list-item input[type=checkbox] { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent2); }
  .word-list-text { flex: 1; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .word-play-btn { font-size: 0.75rem; color: var(--accent2); opacity: 0.45; flex-shrink: 0; padding: 4px 2px; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .word-list-en { font-size: 0.88rem; font-weight: 700; color: var(--text); }
  .word-list-ja { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
  .check-actions { display: flex; gap: 8px; margin-bottom: 10px; }
  .check-action-btn {
    flex: 1; padding: 8px; border: 1.5px solid rgba(99,102,241,0.2); border-radius: 10px; font-size: 0.72rem; font-weight: 700; cursor: pointer;
    touch-action: manipulation; -webkit-appearance: none; appearance: none; font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: #fff; color: var(--accent2);
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<h1>📚 Flash Cards</h1>
<p class="subtitle" id="mainSubtitle">セクションを選んで学習しよう</p>
<button class="btn-edit-mode" id="btnEditMode" onclick="openEditMode()" data-action="editmode">✏️ 編集</button>

<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" onclick="switchTab('flash')">📇 フラッシュ</button>
  <button class="tab-btn" onclick="switchTab('listen')">🎧 リスニング</button>
</div>

<div id="sectionScreen">
  <div class="paste-section">
    <div class="paste-toggle" id="pasteToggle" onclick="togglePasteArea()">単語リストを追加する</div>
    <div id="pasteContent" style="display:none;">
      <textarea class="paste-textarea" id="pasteArea" placeholder="メモ帳の内容をここに貼り付けてください..."></textarea>
      <br>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn-load" id="btnAppend" onclick="appendFromText()" style="background:var(--accent2);">＋ 追記する</button>
        <button class="btn-load" id="btnReplace" onclick="loadFromText()" style="background:#94a3b8;font-size:0.75rem;">全て入れ替え</button>
      </div>
      <div id="appendMsg" style="font-size:0.75rem;color:var(--correct);margin-top:6px;display:none;"></div>
    </div>
  </div>
  <div id="sectionList" class="section-list"></div>
  <button class="btn-all" id="btnStartAll" data-action="startall">📖 全セクションまとめて学習</button>
</div>

<div id="studyScreen">
  <div class="study-header">
    <button class="btn-back" onclick="goHome()">← 戻る</button>
    <div class="study-title" id="studyTitle">セクション1</div>
    <button id="btnReverse" onclick="toggleReverse()" style="background:#fff;border:1.5px solid rgba(99,102,241,0.25);border-radius:10px;padding:5px 10px;font-size:0.72rem;font-weight:700;color:var(--accent2);cursor:pointer;touch-action:manipulation;white-space:nowrap;">EN→JP</button>
    <button id="btnSound" style="background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px;touch-action:manipulation;">🔊</button>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progressText">残り 0 語</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="score-row" id="scoreRow"> 
    <div class="badge ok">✓ <span id="okCount">0</span></div>
    <div class="badge ng">✗ <span id="ngCount">0</span></div>
  </div>
  <div class="card-area" id="cardArea">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-label" id="frontLabel">英単語</div>
        <span id="weakBadge" style="display:none;background:#fee2e2;color:#dc2626;border-radius:99px;padding:2px 10px;font-size:0.68rem;font-weight:700;margin-bottom:8px;">😓 苦手</span>
        <div class="card-word" id="wordText"></div>
        <div class="card-pos" id="posText"></div>
        <button id="btnSpeakWord" onclick="event.stopPropagation();speakWord();" style="margin-top:12px;background:rgba(99,102,241,0.08);border:1.5px solid rgba(99,102,241,0.2);border-radius:99px;padding:5px 16px;font-size:0.8rem;color:var(--accent2);cursor:pointer;touch-action:manipulation;transform:translateZ(2px);">🔊 もう一度聞く</button>        
        <div class="tap-hint">👆 タップして答えを見る</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">意味・例文</div>
        <div class="back-meaning" id="meaningText"></div>
        <button id="btnSpeakRevWord" onclick="event.stopPropagation();speakRevWord();" style="display:none;margin-top:6px;background:rgba(99,102,241,0.08);border:1.5px solid rgba(99,102,241,0.2);border-radius:99px;padding:4px 14px;font-size:0.75rem;color:var(--accent2);cursor:pointer;touch-action:manipulation;transform:translateZ(2px);">🔊 単語を聞く</button>
        <div class="back-example" id="exampleText"></div>
        <button id="btnSpeakExample" onclick="event.stopPropagation();speakExample();" style="margin-top:6px;margin-bottom:4px;background:rgba(59,130,246,0.08);border:1.5px solid rgba(59,130,246,0.2);border-radius:99px;padding:5px 16px;font-size:0.75rem;color:#3b82f6;cursor:pointer;touch-action:manipulation;transform:translateZ(2px);">🔊 例文を聞く</button>
        <div class="back-trans" id="transText"></div>
      </div>
    </div>
  </div>
  <div class="btn-row" id="btnRow">
    <button class="btn btn-ng" id="btnNg" onclick="answer(false)" disabled>✗ もう一度</button>
    <button class="btn btn-flip" id="btnFlip">↺</button>
    <button class="btn btn-ok" id="btnOk" onclick="answer(true)" disabled>✓ 覚えた</button>
  </div>
  <div class="finish-screen" id="finishScreen">
    <div class="finish-title">完了！🎉</div>
    <p style="color:var(--text-muted);font-size:0.85rem;">お疲れ様でした</p>
    <div class="finish-stats">
      <div class="stat-card"><div class="stat-num ok" id="finalOk">0</div><div class="stat-label">✓ 覚えた</div></div>
      <div class="stat-card"><div class="stat-num ng" id="finalNg">0</div><div class="stat-label">✗ もう一度</div></div>
    </div>
    <button class="btn-restart" onclick="restartStudy()">もう一周する 🔄</button>
    <button class="btn-back-home" onclick="goHome()">← セクション一覧へ</button>
  </div>
</div>

<div id="listeningScreen">
  <div class="listening-controls">
    <div class="ctrl-row">
      <div class="ctrl-label">モード</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btnModeWord" onclick="setListenMode('word')">単語のみ</button>
        <button class="toggle-btn" id="btnModeAll" onclick="setListenMode('all')">単語＋例文</button>    
      </div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">フィルター</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btnFilterAll" onclick="setListenFilter('all')">全て</button>
        <button class="toggle-btn" id="btnFilterChecked" onclick="setListenFilter('checked')">チェックのみ</button>
        <button class="toggle-btn" id="btnFilterUnchecked" onclick="setListenFilter('unchecked')">チェック外す</button>
      </div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">セクション</div>
      <select id="listenSectionSelect" onchange="setListenSection(this.value)">
        <option value="all">全セクション</option>
      </select>
    </div>
  </div>
  <button class="listening-play-btn" id="btnListenPlay" onclick="toggleListening()">▶ 再生開始</button>
  <div class="listening-progress" id="listeningProgress">
    <div style="font-size:0.72rem;color:var(--text-muted);">再生中</div>
    <div class="cur-word" id="listeningCurWord">-</div>
    <div class="cur-example" id="listeningCurExample"></div>
    <div class="cur-trans" id="listeningCurTrans"></div>
  </div>
  <div class="check-actions">
    <button class="check-action-btn" onclick="checkAll()">全てチェック</button>
    <button class="check-action-btn" onclick="uncheckAll()">全て外す</button>
  </div>
  <div class="word-list" id="wordList"></div>
</div>

<div id="editScreen" style="display:none;width:100%;max-width:420px;position:relative;z-index:1;padding-bottom:40px;">
  <div class="edit-header">
    <button class="btn-back" id="editBackBtn" type="button">← 戻る</button>
    <div class="edit-title" id="editTitle">編集モード</div>
    <div style="width:60px;"></div>
  </div>
  <div id="editContent"></div>
</div>

<div id="modalOverlay" style="display:none;" onclick="closeModal(event)">
  <div id="modalBox">
    <div class="modal-drag-bar"></div>
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'flashcards_sections_v1';
const STATS_KEY   = 'flashcards_stats_v1';
const SECTION_MAX = 50;
let sections = [];
let studyCards = [];
let queue = [];
let current = 0, okCount = 0, ngCount = 0;
let isFlipped = false, isTouching = false;
let reverseMode = false;

// 苦手統計
function loadStats() { try { const s = localStorage.getItem(STATS_KEY); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } }
function saveStats(stats) { try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch(e) {} }
function recordAnswer(word, ok) {
  const stats = loadStats();
  if (!stats[word]) stats[word] = { ok: 0, ng: 0 };
  if (ok) stats[word].ok++; else stats[word].ng++;
  saveStats(stats);
}
function getWeakScore(word) {
  const s = loadStats()[word];
  if (!s) return 0;
  const t = s.ok + s.ng;
  return t === 0 ? 0 : s.ng / t;
}

// localStorage
function saveSections() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sections)); } catch(e) {} }
function loadSections() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const p = JSON.parse(s); if (p && p.length > 0) return p; } } catch(e) {}
  return null;
}

// パース（★ここが数字なしでも賢く読み取るように修正された部分です）
function parseCards(text) {
  const cards = [], lines = text.split('\n');
  let i = 0;
  // 数字. があってもなくても「単語（品詞）」の形を認識する正規表現
  const wordRegex = /^(?:\d+[.\s\t]+)?(.+?)[（\(](.+?)[）\)]\s*$/;

  while (i < lines.length) {
    const line = lines[i].trim();
    const m = line.match(wordRegex);
    if (m) {
      const word = m[1].trim(), pos = m[2].trim();
      let meaning = '', example = '', trans = '';
      i++;
      while (i < lines.length) {
        const l = lines[i].trim();
        if (l.startsWith('意味：')) meaning = l.replace('意味：','').trim();
        else if (l.startsWith('例文：')) example = l.replace('例文：','').trim();
        else if (l.startsWith('訳：')) trans = l.replace('訳：','').trim();
        // 次の単語が来たらループを抜ける
        else if (l.match(wordRegex)) break;
        i++;
      }
      if (word) cards.push({ word, pos, meaning, example, trans });
    } else { i++; }
  }
  return cards;
}

// 50語ごとにセクション分割
function addCardsToSections(newCards) {
  if (newCards.length === 0) return;
  if (sections.length === 0) sections.push({ name: 'セクション1', cards: [] });
  for (const card of newCards) {
    let last = sections[sections.length - 1];
    if (last.cards.length >= SECTION_MAX) {
      sections.push({ name: `セクション${sections.length + 1}`, cards: [] });
      last = sections[sections.length - 1];
    }
    last.cards.push(card);
  }
  saveSections();
}
function loadFromText() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { alert('テキストを貼り付けてください。'); return; }
  const parsed = parseCards(text);
  if (parsed.length === 0) { alert('単語が見つかりませんでした。'); return; }
  sections = [];
  addCardsToSections(parsed);
  document.getElementById('pasteArea').value = '';
  renderSectionList();
}
function appendFromText() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { alert('テキストを貼り付けてください。'); return; }
  const parsed = parseCards(text);
  if (parsed.length === 0) { alert('単語が見つかりませんでした。'); return; }
  addCardsToSections(parsed);
  document.getElementById('pasteArea').value = '';
  const total = sections.reduce((s, sec) => s + sec.cards.length, 0);
  const msg = document.getElementById('appendMsg');
  msg.textContent = `✓ ${parsed.length}語追加（合計 ${total}語・${sections.length}セクション）`;
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; }, 3000);
  renderSectionList();
}

// セクション一覧表示
function renderSectionList() {
  const list = document.getElementById('sectionList');
  list.innerHTML = '';
  if (sections.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:20px 0;">↓ 単語リストを追加してください</p>';
    return;
  }
  sections.forEach((sec, idx) => {
    const weakCount = sec.cards.filter(c => getWeakScore(c.word) >= 0.5).length;
    const div = document.createElement('div');
    div.className = 'section-card';
    div.innerHTML = `
      <div>
        <div class="section-name">${sec.name}</div>
        <div class="section-meta">${sec.cards.length}語</div>
        ${weakCount > 0 ? `<div class="section-weak">😓 苦手 ${weakCount}語</div>` : ''}
      </div>
      <div class="section-arrow">›</div>`;
    div.addEventListener('click', () => startSection(idx));    
    list.appendChild(div);
  });
}

// 学習開始
function startSection(idx) {
  studyCards = sections[idx].cards;
  document.getElementById('studyTitle').textContent = sections[idx].name;
  beginStudy();
}
function startAll() {
  if (sections.length === 0) { alert('単語が登録されていません。'); return; }
  studyCards = sections.flatMap(s => s.cards);
  document.getElementById('studyTitle').textContent = '全セクション';
  beginStudy();
}
function beginStudy() {
  current = 0; okCount = 0; ngCount = 0;
  queue = buildQueue(studyCards);
  document.getElementById('sectionScreen').style.display = 'none';
  document.getElementById('listeningScreen').style.display = 'none';
  document.getElementById('tabNav').style.display = 'none';
  document.getElementById('mainSubtitle').style.display = 'none';
  const ss = document.getElementById('studyScreen');
  ss.style.display = 'flex';
  ss.style.flexDirection = 'column'; ss.style.alignItems = 'center';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('btnRow').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('scoreRow').style.display = 'flex';
  document.getElementById('finishScreen').classList.remove('show');
  showCard();
}
function goHome() {
  document.getElementById('studyScreen').style.display = 'none';
  document.getElementById('sectionScreen').style.display = 'block';
  document.getElementById('listeningScreen').style.display = 'none';
  document.getElementById('tabNav').style.display = 'flex';
  document.getElementById('mainSubtitle').style.display = 'block';
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  document.querySelectorAll('.tab-btn')[1].classList.remove('active');
  renderSectionList();
}

// 間隔反復キュー
function buildQueue(cards) {
  return [...cards]
    .sort((a, b) => { const d = getWeakScore(b.word) - getWeakScore(a.word); return d !== 0 ? d : Math.random() - 0.5; })
    .map((card, i) => ({ card, dueAt: i }));
}

// 音声
let speechEnabled = true;
let _utter = null;
function speak(text, lang, rate) {
  if (!speechEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (_utter) { _utter.onend = null; _utter.onerror = null; _utter = null; }
  _utter = new SpeechSynthesisUtterance(text);
  _utter.lang = lang || 'en-US';
  _utter.rate = rate || 0.9;
  _utter.volume = 1;
  const u = _utter;
  setTimeout(() => { if (u === _utter) window.speechSynthesis.speak(u); }, 100);
}
function speakWord() { speak(document.getElementById('wordText').textContent, 'en-US', 0.8); }
function speakRevWord() { speak(document.getElementById('meaningText').textContent, 'en-US', 0.8); }
function speakExample() { speak(document.getElementById('exampleText').textContent, 'en-US', 0.85); }

// 逆モード切替
function toggleReverse() {
  reverseMode = !reverseMode;
  const btn = document.getElementById('btnReverse');
  btn.textContent = reverseMode ? 'JP→EN' : 'EN→JP';
  btn.style.background = reverseMode ? 'rgba(99,102,241,0.12)' : '#fff';
  const idx = queue.findIndex(q => q.dueAt <= current);
  if (idx !== -1) {
    const c = queue[idx].card;
    renderCard(c);
    document.getElementById('cardInner').classList.remove('flipped');
    isFlipped = false;
    document.getElementById('btnOk').disabled = true;
    document.getElementById('btnNg').disabled = true;
  }
}

// カード表示
function showCard() {
  const idx = queue.findIndex(q => q.dueAt <= current);
  if (idx === -1) { showFinish(); return; }
  const c = queue[idx].card;
  renderCard(c);
  document.getElementById('weakBadge').style.display = getWeakScore(c.word) >= 0.5 ? 'inline-block' : 'none';
  document.getElementById('cardInner').classList.remove('flipped');
  isFlipped = false;
  document.getElementById('btnOk').disabled = true;
  document.getElementById('btnNg').disabled = true;
  if (!reverseMode) speak(c.word, 'en-US', 0.8);
  updateProgress();
}
function renderCard(c) {
  if (reverseMode) {
    document.getElementById('frontLabel').textContent  = '日本語';
    document.getElementById('wordText').textContent    = c.meaning;
    document.getElementById('posText').textContent     = c.pos;
    document.getElementById('meaningText').textContent = c.word;
    document.getElementById('exampleText').textContent = c.example;
    document.getElementById('transText').textContent   = c.trans;
    document.getElementById('btnSpeakWord').style.display    = 'none';
    document.getElementById('btnSpeakRevWord').style.display = 'inline-block';
    document.getElementById('btnSpeakExample').style.display = 'inline-block';
  } else {
    document.getElementById('frontLabel').textContent  = '英単語';
    document.getElementById('wordText').textContent    = c.word;
    document.getElementById('posText').textContent     = c.pos;
    document.getElementById('meaningText').textContent = c.meaning;
    document.getElementById('exampleText').textContent = c.example;
    document.getElementById('transText').textContent   = c.trans;
    document.getElementById('btnSpeakWord').style.display    = 'inline-block';
    document.getElementById('btnSpeakRevWord').style.display = 'none';
    document.getElementById('btnSpeakExample').style.display = 'inline-block';
  }
}
function updateProgress() {
  const remaining = queue.filter(q => q.dueAt >= current).length;
  const total = queue.length;
  document.getElementById('progressText').textContent = `残り ${remaining} 語`;
  const pct = total > 0 ? Math.round(((total - remaining) / total) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('okCount').textContent = okCount;
  document.getElementById('ngCount').textContent = ngCount;
}
function flipCard() {
  isFlipped = !isFlipped;
  if (isFlipped) {
    document.getElementById('cardInner').classList.add('flipped');
    document.getElementById('btnOk').disabled = false;
    document.getElementById('btnNg').disabled = false;
  } else {
    document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('btnOk').disabled = true;
    document.getElementById('btnNg').disabled = true;
  }
}
function answer(ok) {
  const idx = queue.findIndex(q => q.dueAt <= current);
  if (idx === -1) return;
  const item = queue[idx];
  recordAnswer(item.card.word, ok);
  if (ok) { okCount++; queue.splice(idx, 1); }
  else    { ngCount++; queue.splice(idx, 1); queue.push({ card: item.card, dueAt: current + 2 }); }
  current++;
  showCard();
}
function showFinish() {
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('btnRow').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('scoreRow').style.display = 'none';
  document.getElementById('finishScreen').classList.add('show');
  document.getElementById('finalOk').textContent = okCount;
  document.getElementById('finalNg').textContent = ngCount;
}
function restartStudy() {
  current = 0; okCount = 0; ngCount = 0;
  queue = buildQueue(studyCards);
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('btnRow').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('scoreRow').style.display = 'flex';
  document.getElementById('finishScreen').classList.remove('show');
  showCard();
}

// 音声ボタン
document.getElementById('btnSound').addEventListener('click', function() {
  speechEnabled = !speechEnabled;
  this.textContent = speechEnabled ? '🔊' : '🔇';
  if (!speechEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
});

// iOS タッチ対応
const cardArea = document.getElementById('cardArea');
const btnFlip  = document.getElementById('btnFlip');
function isSpeakButton(e) { return e.target.closest('#btnSpeakWord, #btnSpeakExample, #btnSpeakRevWord'); }

// ===== リスニング機能 =====
const CHECK_KEY = 'flashcards_checks_v1';
let listenMode    = 'word'; // 'word' | 'all'
let listenFilter  = 'all'; // 'all' | 'checked' | 'unchecked'
let listenSection = 'all'; // 'all' | section index (number)
let isListening   = false;
let listenIndex   = 0;
let listenList    = [];

function loadChecks() { try { const s = localStorage.getItem(CHECK_KEY); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } }
function saveChecks(checks) { try { localStorage.setItem(CHECK_KEY, JSON.stringify(checks)); } catch(e) {} }
function setCheck(word, val) { const checks = loadChecks(); checks[word] = val; saveChecks(checks); }
function isChecked(word) { return !!loadChecks()[word]; }
function setListenMode(mode) {
  listenMode = mode;
  document.getElementById('btnModeWord').classList.toggle('active', mode === 'word');
  document.getElementById('btnModeAll').classList.toggle('active',  mode === 'all');
}
function setListenFilter(filter) {
  listenFilter = filter;
  document.getElementById('btnFilterAll').classList.toggle('active',       filter === 'all');
  document.getElementById('btnFilterChecked').classList.toggle('active',   filter === 'checked');
  document.getElementById('btnFilterUnchecked').classList.toggle('active', filter === 'unchecked');
}
function setListenSection(val) {
  listenSection = val === 'all' ? 'all' : parseInt(val);
}
function updateListenSectionSelect() {
  const sel = document.getElementById('listenSectionSelect');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="all">全セクション</option>';
  sections.forEach((sec, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = sec.name;
    sel.appendChild(opt);
  });
  sel.value = current;
  if (sel.value !== String(current)) sel.value = 'all';
}
function getAllCards() { return sections.flatMap(s => s.cards); }
function getListenList() {
  const base = (listenSection === 'all' || !sections[listenSection])
    ? getAllCards()
    : sections[listenSection].cards;
  if (listenFilter === 'all')       return base;
  if (listenFilter === 'checked')   return base.filter(c => isChecked(c.word));
  if (listenFilter === 'unchecked') return base.filter(c => !isChecked(c.word));
  return base;
}
function renderWordList() {
  updateListenSectionSelect();
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  const all = getAllCards();
  const checks = loadChecks();
  all.forEach(c => {
    const div = document.createElement('div');
    div.className = 'word-list-item';
    div.id = `wli-${c.word}`;
    div.innerHTML = `
      <input type="checkbox" id="chk-${c.word}" ${checks[c.word] ? 'checked' : ''} onchange="onCheckChange('${c.word.replace(/'/g, "\\'")}', this.checked)">
      <div class="word-list-text">
        <div class="word-list-en">${c.word} <span style="font-size:0.7rem;color:var(--text-muted);font-weight:400;">${c.pos}</span></div>
        <div class="word-list-ja">${c.meaning}</div>
      </div>
      <span class="word-play-btn">▶</span>`;
    const playArea = div.querySelector('.word-list-text');
    const playBtn  = div.querySelector('.word-play-btn');
    playArea.addEventListener('click', () => startFromWord(c.word));
    playBtn.addEventListener('click',  () => startFromWord(c.word));
    list.appendChild(div);
  });
}
function onCheckChange(word, val) { setCheck(word, val); }
function checkAll() { const checks = loadChecks(); getAllCards().forEach(c => { checks[c.word] = true; }); saveChecks(checks); renderWordList(); }
function uncheckAll() { saveChecks({}); renderWordList(); }

function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}
function startListening() {
  listenList = getListenList();
  if (listenList.length === 0) { alert('再生する単語がありません。フィルター設定を確認してください。'); return; }
  isListening = true; listenIndex = 0;
  document.getElementById('btnListenPlay').textContent = '⏹ 停止';
  document.getElementById('btnListenPlay').classList.add('playing');
  document.getElementById('listeningProgress').style.display = 'block';
  playNext();
}
function startFromWord(word) {
  listenList = getListenList();
  if (listenList.length === 0) { alert('再生する単語がありません。フィルター設定を確認してください。'); return; }
  const idx = listenList.findIndex(c => c.word === word);
  listenIndex = idx !== -1 ? idx : 0;
  if (isListening) {
    window.speechSynthesis && window.speechSynthesis.cancel();
    playNext();
  } else {
    isListening = true;
    document.getElementById('btnListenPlay').textContent = '⏹ 停止';
    document.getElementById('btnListenPlay').classList.add('playing');
    document.getElementById('listeningProgress').style.display = 'block';
    playNext();
  }
}
function stopListening() {
  isListening = false;
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('btnListenPlay').textContent = '▶ 再生開始';
  document.getElementById('btnListenPlay').classList.remove('playing');
  document.getElementById('listeningProgress').style.display = 'none';
  document.getElementById('listeningCurWord').textContent = '-';
  document.getElementById('listeningCurExample').textContent = '';
  document.getElementById('listeningCurTrans').textContent = '';
  document.querySelectorAll('.word-list-item.playing-now').forEach(el => el.classList.remove('playing-now'));
}
function playNext() {
  if (!isListening || listenIndex >= listenList.length) { stopListening(); return; }
  const c = listenList[listenIndex];
  document.querySelectorAll('.word-list-item.playing-now').forEach(el => el.classList.remove('playing-now'));
  const item = document.getElementById(`wli-${c.word}`);
  if (item) { item.classList.add('playing-now'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  document.getElementById('listeningCurWord').textContent = `${c.word}　${c.meaning}`;
  document.getElementById('listeningCurExample').textContent = c.example || '';
  document.getElementById('listeningCurTrans').textContent = c.trans || '';
  const seq = [];
  seq.push({ text: c.word, lang: 'en-US', rate: 0.8 });
  seq.push({ text: c.meaning, lang: 'ja-JP', rate: 0.9 });
  if (listenMode === 'all') seq.push({ text: c.example, lang: 'en-US', rate: 0.85 });
  playSequence(seq, 0, () => { listenIndex++; setTimeout(() => { playNext(); }, 150); });
}
function playSequence(seq, idx, onDone) {
  if (!isListening || idx >= seq.length) { onDone(); return; }
  const item = seq[idx];
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(item.text);
  u.lang = item.lang; u.rate = item.rate;
  u.onend = () => { setTimeout(() => { playSequence(seq, idx + 1, onDone); }, 200); };
  u.onerror = () => { setTimeout(() => { playSequence(seq, idx + 1, onDone); }, 200); };
  setTimeout(() => { if (isListening) window.speechSynthesis.speak(u); }, 50);
}

// タブ切替
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab-btn');
  tabs[0].classList.toggle('active', tab === 'flash');
  tabs[1].classList.toggle('active', tab === 'listen');
  document.getElementById('sectionScreen').style.display   = tab === 'flash' ? 'block' : 'none';
  document.getElementById('listeningScreen').style.display = tab === 'listen' ? 'block' : 'none';
  document.getElementById('mainSubtitle').style.display    = 'block';
  if (tab === 'listen') renderWordList();
  if (tab === 'flash' && isListening) stopListening();
  if (tab === 'listen' && isListening) stopListening();
}

function togglePasteArea() {

// ★Safari用：ボタンのタッチ登録
(function() {
  var map = { startall: startAll, editmode: openEditMode };
  ['btnStartAll','btnEditMode'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var touching = false;
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); touching = true;
      var fn = map[this.dataset.action]; if (fn) fn();
      setTimeout(function() { touching = false; }, 300);
    }, { passive: false });
    el.addEventListener('click', function() {
      if (touching) return;
      var fn = map[this.dataset.action]; if (fn) fn();
    });
  });
})();

<script>
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
}
function openModal(title, bodyHTML, btnsHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalBtns').innerHTML = btnsHTML;
  document.getElementById('modalOverlay').style.display = 'flex';
}

// 新規セクション作成
function openNewSectionModal() {
  openModal('新しいセクションを作る',
    `<input class="modal-input" id="newSecName" placeholder="セクション名" value="セクション${sections.length + 1}">`,
    `<button class="modal-btn modal-btn-cancel" data-maction="close">キャンセル</button><button class="modal-btn modal-btn-ok" data-maction="create">作成</button>`
  );
  setTimeout(() => document.getElementById('newSecName').focus(), 100);
}
function createNewSection() {
  const name = document.getElementById('newSecName').value.trim();
  if (!name) return;
  sections.push({ name, cards: [] }); saveSections(); renderSectionList();
  document.getElementById('modalOverlay').style.display = 'none';
}
function openDeleteSectionModal(idx) {
  openModal('セクションを削除',
    `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">「${sections[idx].name}」（${sections[idx].cards.length}語）を削除します。<br>この操作は取り消せません。</p>`,
    `<button class="modal-btn modal-btn-cancel" data-maction="close">キャンセル</button><button class="modal-btn modal-btn-del" data-maction="delsec" data-i="${idx}">削除する</button>`
  );
}
function deleteSection(idx) {
  sections.splice(idx, 1); saveSections(); renderSectionList();
  document.getElementById('modalOverlay').style.display = 'none';
}
function openEditSectionModal(idx) {
  const sec = sections[idx];
  let wordsHTML = sec.cards.map((c, ci) => `
    <div class="word-edit-item">
      <div class="word-edit-info">
        <div class="word-edit-en">${c.word} <span style="font-size:0.7rem;color:var(--text-muted);font-weight:400;">${c.pos}</span></div>
        <div class="word-edit-ja">${c.meaning}</div>
      </div>
      <div class="word-edit-btns">
        <button class="sec-btn sec-btn-edit" data-maction="editword" data-i="${idx}" data-j="${ci}">✏️</button>
        <button class="sec-btn sec-btn-del"  data-maction="delword"  data-i="${idx}" data-j="${ci}">🗑️</button>
      </div>
    </div>`).join('');
  openModal('セクション編集',
    `<div style="margin-bottom:14px;"><div style="font-size:0.75rem;color:var(--text-muted);font-weight:600;margin-bottom:6px;">セクション名</div>
      <input class="modal-input" id="editSecName" value="${sec.name}">
      <button class="modal-btn modal-btn-ok" data-maction="savename" data-i="${idx}" style="width:100%;margin-bottom:16px;">名前を保存</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:0.75rem;color:var(--text-muted);font-weight:600;">単語一覧（${sec.cards.length}語）</div>
      ${sec.cards.length < 50 ? `<button class="sec-btn sec-btn-edit" data-maction="addword" data-i="${idx}">＋ 単語を追加</button>` : ''}
    </div>
    <div style="max-height:320px;overflow-y:auto;">${wordsHTML}</div>`,
    `<button class="modal-btn modal-btn-cancel" data-maction="close" style="width:100%;">閉じる</button>`
  );
}
function saveSecName(idx) {
  const name = document.getElementById('editSecName').value.trim();
  if (!name) return;
  sections[idx].name = name; saveSections(); renderSectionList();
  const btn = document.querySelector('[data-maction="savename"]');
  if (btn) { btn.textContent = '✓ 保存しました'; setTimeout(() => { btn.textContent = '名前を保存'; }, 1500); }
}
function openDeleteWordModal(secIdx, cardIdx) {
  const c = sections[secIdx].cards[cardIdx];
  openModal('単語を削除',
    `<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">「${c.word}」を削除します。<br>この操作は取り消せません。</p>`,
    `<button class="modal-btn modal-btn-cancel" data-maction="backedit" data-i="${secIdx}">戻る</button><button class="modal-btn modal-btn-del" data-maction="dodelword" data-i="${secIdx}" data-j="${cardIdx}">削除する</button>`
  );
}
function deleteWord(secIdx, cardIdx) { sections[secIdx].cards.splice(cardIdx, 1); saveSections(); renderSectionList(); openEditSectionModal(secIdx); }

function openEditWordModal(secIdx, cardIdx) {
  const c = sections[secIdx].cards[cardIdx];
  openModal('単語を編集',
    `<input class="modal-input" id="ew-word" placeholder="単語" value="${c.word}">
     <input class="modal-input" id="ew-pos" placeholder="品詞（例：名詞）" value="${c.pos}">
     <input class="modal-input" id="ew-meaning" placeholder="意味" value="${c.meaning}">
     <textarea class="modal-textarea" id="ew-example" placeholder="例文">${c.example}</textarea>
     <textarea class="modal-textarea" id="ew-trans" placeholder="訳">${c.trans}</textarea>`,
    `<button class="modal-btn modal-btn-cancel" data-maction="backedit" data-i="${secIdx}">戻る</button><button class="modal-btn modal-btn-ok" data-maction="saveword" data-i="${secIdx}" data-j="${cardIdx}">保存</button>`
  );
}
function saveWord(secIdx, cardIdx) {
  sections[secIdx].cards[cardIdx] = {
    word: document.getElementById('ew-word').value.trim(),
    pos: document.getElementById('ew-pos').value.trim(),
    meaning: document.getElementById('ew-meaning').value.trim(),
    example: document.getElementById('ew-example').value.trim(),
    trans: document.getElementById('ew-trans').value.trim(),
  };
  saveSections(); renderSectionList(); openEditSectionModal(secIdx);
}
function openAddWordModal(secIdx) {
  openModal('単語を追加',
    `<input class="modal-input" id="ew-word" placeholder="単語">
     <input class="modal-input" id="ew-pos" placeholder="品詞（例：名詞）">
     <input class="modal-input" id="ew-meaning" placeholder="意味">
     <textarea class="modal-textarea" id="ew-example" placeholder="例文"></textarea>
     <textarea class="modal-textarea" id="ew-trans" placeholder="訳"></textarea>`,
    `<button class="modal-btn modal-btn-cancel" data-maction="backedit" data-i="${secIdx}">戻る</button><button class="modal-btn modal-btn-ok" data-maction="doaddword" data-i="${secIdx}">追加</button>`
  );
}
function addWord(secIdx) {
  const word = document.getElementById('ew-word').value.trim();
  if (!word) return;
  sections[secIdx].cards.push({
    word,
    pos: document.getElementById('ew-pos').value.trim(),
    meaning: document.getElementById('ew-meaning').value.trim(),
    example: document.getElementById('ew-example').value.trim(),
    trans: document.getElementById('ew-trans').value.trim(),
  });
  saveSections(); renderSectionList(); openEditSectionModal(secIdx);
}

// ===== 編集モード =====
function openEditMode() {
  document.getElementById('sectionScreen').style.display = 'none';
  document.getElementById('listeningScreen').style.display = 'none';
  document.getElementById('tabNav').style.display = 'none';
  document.getElementById('mainSubtitle').style.display = 'none';
  document.getElementById('btnEditMode').style.display = 'none';
  document.getElementById('editScreen').style.display = '';
  renderEditSections();
}
function closeEditMode() {
  document.getElementById('editScreen').style.display = 'none';
  document.getElementById('sectionScreen').style.display = 'block';
  document.getElementById('tabNav').style.display = 'flex';
  document.getElementById('mainSubtitle').style.display = 'block';
  document.getElementById('btnEditMode').style.display = 'block';
  renderSectionList();
}
function _editReg(el) {
  el.querySelectorAll('[data-ea]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var a = this.getAttribute('data-ea');
      var i = parseInt(this.getAttribute('data-i'));
      var j = parseInt(this.getAttribute('data-j'));
      if (a === 'opensec')   renderEditWords(i);
      else if (a === 'renamesec') showRenameSectionForm(i);
      else if (a === 'delsec')    confirmDeleteSectionEdit(i);
      else if (a === 'editword')  showEditWordForm(i, j);
      else if (a === 'delword')   confirmDeleteWordEdit(i, j);
      else if (a === 'moveword')  showMoveWordView(i, j);
    });
  });
}
function renderEditSections() {
  document.getElementById('editTitle').textContent = 'セクション一覧';
  document.getElementById('editBackBtn').onclick = closeEditMode;
  var c = document.getElementById('editContent');
  var html = '<button class="edit-add-btn" id="eAddSec" type="button">＋ セクションを追加</button>';
  if (sections.length === 0) {
    html += '<p class="edit-empty">セクションがありません</p>';
  } else {
    html += '<div class="edit-list">';
    sections.forEach(function(sec, idx) {
      html += '<div class="edit-list-item">'
        + '<button class="edit-item-btn" type="button" data-ea="opensec" data-i="' + idx + '">'
        + '<div class="edit-item-name">' + sec.name + '</div><div class="edit-item-sub">' + sec.cards.length + '語</div></button>'
        + '<div class="edit-item-actions"><button class="edit-icon-btn" type="button" data-ea="renamesec" data-i="' + idx + '">✏️</button>'        
        + '<button class="edit-icon-btn edit-icon-del" type="button" data-ea="delsec" data-i="' + idx + '">🗑️</button></div></div>';
    });
    html += '</div>';
  }
  c.innerHTML = html;
  document.getElementById('eAddSec').addEventListener('click', showAddSectionForm);
  _editReg(c);
}
function renderEditWords(secIdx) {
  var sec = sections[secIdx];
  document.getElementById('editTitle').textContent = sec.name;
  document.getElementById('editBackBtn').onclick = renderEditSections;
  var c = document.getElementById('editContent');
  var html = '<button class="edit-add-btn" id="eAddWord" type="button">＋ 単語を追加</button>';
  if (sec.cards.length === 0) {
    html += '<p class="edit-empty">単語がありません</p>';
  } else {
    html += '<div class="edit-list">';
    sec.cards.forEach(function(card, ci) {
      html += '<div class="edit-list-item">'
        + '<div class="edit-item-text"><div class="edit-item-name">' + card.word + '<span class="edit-item-pos">' + card.pos + '</span></div>'
        + '<div class="edit-item-sub">' + card.meaning + '</div></div>'
        + '<div class="edit-item-actions"><button class="edit-icon-btn" type="button" data-ea="moveword" data-i="' + secIdx + '" data-j="' + ci + '">↕️</button>'     
        + '<button class="edit-icon-btn" type="button" data-ea="editword" data-i="' + secIdx + '" data-j="' + ci + '">✏️</button>'
        + '<button class="edit-icon-btn edit-icon-del" type="button" data-ea="delword" data-i="' + secIdx + '" data-j="' + ci + '">🗑️</button></div></div>';
    });
    html += '</div>';
  }
  c.innerHTML = html;
  document.getElementById('eAddWord').addEventListener('click', function() { showAddWordForm(secIdx); });
  _editReg(c);
}
function showAddSectionForm() {
  document.getElementById('editTitle').textContent = 'セクションを追加';
  document.getElementById('editBackBtn').onclick = renderEditSections;
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><div class="edit-form-label">セクション名</div>'
    + '<input class="edit-form-input" id="ef0" type="text" placeholder="例: セクション4" value="セクション' + (sections.length + 1) + '">'
    + '<button class="edit-form-btn edit-form-btn-ok" type="button" id="ef-ok">作成</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() {
    var name = document.getElementById('ef0').value.trim(); if (!name) return;
    sections.push({ name: name, cards: [] }); saveSections(); renderEditSections();
  });
  document.getElementById('ef-cancel').addEventListener('click', renderEditSections);
  setTimeout(function() { document.getElementById('ef0').focus(); }, 100);
}
function showRenameSectionForm(idx) {
  document.getElementById('editTitle').textContent = '名前を変更';
  document.getElementById('editBackBtn').onclick = renderEditSections;
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><div class="edit-form-label">セクション名</div>'
    + '<input class="edit-form-input" id="ef0" type="text" value="' + sections[idx].name + '">'
    + '<button class="edit-form-btn edit-form-btn-ok" type="button" id="ef-ok">保存</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() {
    var name = document.getElementById('ef0').value.trim(); if (!name) return;
    sections[idx].name = name; saveSections(); renderEditSections();
  });
  document.getElementById('ef-cancel').addEventListener('click', renderEditSections);
  setTimeout(function() { document.getElementById('ef0').focus(); }, 100);
}
function confirmDeleteSectionEdit(idx) {
  document.getElementById('editTitle').textContent = 'セクションを削除';
  document.getElementById('editBackBtn').onclick = renderEditSections;
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><p class="edit-confirm-msg">「' + sections[idx].name + '」（' + sections[idx].cards.length + '語）を削除します。<br>この操作は取り消せません。</p>'
    + '<button class="edit-form-btn edit-form-btn-del" type="button" id="ef-ok">削除する</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() { sections.splice(idx, 1); saveSections(); renderEditSections(); });
  document.getElementById('ef-cancel').addEventListener('click', renderEditSections);
}
function showEditWordForm(secIdx, cardIdx) {
  var card = sections[secIdx].cards[cardIdx];
  document.getElementById('editTitle').textContent = '単語を編集';
  document.getElementById('editBackBtn').onclick = function() { renderEditWords(secIdx); };
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><div class="edit-form-label">単語</div><input class="edit-form-input" id="ef-word" type="text" value="' + card.word + '">'
    + '<div class="edit-form-label">品詞</div><input class="edit-form-input" id="ef-pos" type="text" value="' + card.pos + '">'
    + '<div class="edit-form-label">意味</div><input class="edit-form-input" id="ef-meaning" type="text" value="' + card.meaning + '">'
    + '<div class="edit-form-label">例文</div><textarea class="edit-form-textarea" id="ef-example">' + card.example + '</textarea>'
    + '<div class="edit-form-label">訳</div><textarea class="edit-form-textarea" id="ef-trans">' + card.trans + '</textarea>'
    + '<button class="edit-form-btn edit-form-btn-ok" type="button" id="ef-ok">保存</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() {
    sections[secIdx].cards[cardIdx] = {
      word: document.getElementById('ef-word').value.trim(), pos: document.getElementById('ef-pos').value.trim(),
      meaning: document.getElementById('ef-meaning').value.trim(), example: document.getElementById('ef-example').value.trim(), trans: document.getElementById('ef-trans').value.trim()
    };
    saveSections(); renderEditWords(secIdx);
  });
  document.getElementById('ef-cancel').addEventListener('click', function() { renderEditWords(secIdx); });
}
function showAddWordForm(secIdx) {
  document.getElementById('editTitle').textContent = '単語を追加';
  document.getElementById('editBackBtn').onclick = function() { renderEditWords(secIdx); };
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><div class="edit-form-label">単語</div><input class="edit-form-input" id="ef-word" type="text" placeholder="単語">'
    + '<div class="edit-form-label">品詞</div><input class="edit-form-input" id="ef-pos" type="text" placeholder="例: 名詞">'
    + '<div class="edit-form-label">意味</div><input class="edit-form-input" id="ef-meaning" type="text" placeholder="意味">'
    + '<div class="edit-form-label">例文</div><textarea class="edit-form-textarea" id="ef-example" placeholder="例文"></textarea>'
    + '<div class="edit-form-label">訳</div><textarea class="edit-form-textarea" id="ef-trans" placeholder="訳"></textarea>'
    + '<button class="edit-form-btn edit-form-btn-ok" type="button" id="ef-ok">追加</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() {
    var word = document.getElementById('ef-word').value.trim(); if (!word) return;
    sections[secIdx].cards.push({
      word: word, pos: document.getElementById('ef-pos').value.trim(), meaning: document.getElementById('ef-meaning').value.trim(),
      example: document.getElementById('ef-example').value.trim(), trans: document.getElementById('ef-trans').value.trim()
    });
    saveSections(); renderEditWords(secIdx);
  });
  document.getElementById('ef-cancel').addEventListener('click', function() { renderEditWords(secIdx); });
  setTimeout(function() { document.getElementById('ef-word').focus(); }, 100);
}
function confirmDeleteWordEdit(secIdx, cardIdx) {
  var card = sections[secIdx].cards[cardIdx];
  document.getElementById('editTitle').textContent = '単語を削除';
  document.getElementById('editBackBtn').onclick = function() { renderEditWords(secIdx); };
  var c = document.getElementById('editContent');
  c.innerHTML = '<div class="edit-form"><p class="edit-confirm-msg">「' + card.word + '」を削除します。<br>この操作は取り消せません。</p>'
    + '<button class="edit-form-btn edit-form-btn-del" type="button" id="ef-ok">削除する</button><button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  document.getElementById('ef-ok').addEventListener('click', function() { sections[secIdx].cards.splice(cardIdx, 1); saveSections(); renderEditWords(secIdx); });
  document.getElementById('ef-cancel').addEventListener('click', function() { renderEditWords(secIdx); });
}
function showMoveWordView(secIdx, cardIdx) {
  var card = sections[secIdx].cards[cardIdx];
  document.getElementById('editTitle').textContent = '単語を移動';
  document.getElementById('editBackBtn').onclick = function() { renderEditWords(secIdx); };
  var c = document.getElementById('editContent');
  var html = '<div class="edit-form"><p class="edit-confirm-msg">「' + card.word + '」の移動先セクションを選んでください：</p>';
  sections.forEach(function(sec, i) {
    if (i === secIdx) return;
    html += '<button class="edit-move-btn" type="button" data-moveto="' + i + '">' + sec.name + ' <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">' + sec.cards.length + '語</span></button>';
  });
  html += '<button class="edit-form-btn edit-form-btn-cancel" type="button" id="ef-cancel">キャンセル</button></div>';
  c.innerHTML = html;
  c.querySelectorAll('[data-moveto]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var targetIdx = parseInt(this.getAttribute('data-moveto'));
      sections[targetIdx].cards.push(card); sections[secIdx].cards.splice(cardIdx, 1);
      saveSections(); renderEditWords(secIdx);
    });
  });
  document.getElementById('ef-cancel').addEventListener('click', function() { renderEditWords(secIdx); });
}

// モーダルイベント委譲（iOS対応）
(function() {
  var modalBox = document.getElementById('modalBox');
  var overlay  = document.getElementById('modalOverlay');
  var _touching = false;
  function dispatchModal(btn) {
    var a = btn.dataset.maction; var i = parseInt(btn.dataset.i); var j = parseInt(btn.dataset.j);
    if (a === 'close')       overlay.style.display = 'none';
    else if (a === 'create')    createNewSection();
    else if (a === 'delsec')    deleteSection(i);
    else if (a === 'savename')  saveSecName(i);
    else if (a === 'addword')   openAddWordModal(i);
    else if (a === 'editword')  openEditWordModal(i, j);
    else if (a === 'delword')   openDeleteWordModal(i, j);
    else if (a === 'backedit')  openEditSectionModal(i);
    else if (a === 'dodelword') deleteWord(i, j);
    else if (a === 'saveword')  saveWord(i, j);
    else if (a === 'doaddword') addWord(i);
  }
  modalBox.addEventListener('touchend', function(e) {
    var btn = e.target.closest('[data-maction]'); if (!btn) return;
    e.preventDefault(); _touching = true; dispatchModal(btn); setTimeout(function() { _touching = false; }, 300);
  }, { passive: false });
  modalBox.addEventListener('click', function(e) {
    if (_touching) return;
    var btn = e.target.closest('[data-maction]'); if (!btn) return; dispatchModal(btn);
  });
  overlay.addEventListener('touchend', function(e) { if (e.target === this) this.style.display = 'none'; }, { passive: true });
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}); });
